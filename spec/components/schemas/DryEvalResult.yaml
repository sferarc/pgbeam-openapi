type: object
description: >-
  The decision the proxy would reach for the supplied statement under the
  supplied policy. verdict is the headline outcome; the remaining fields detail
  why.
required:
  - verdict
  - rule
  - reason
properties:
  verdict:
    type: string
    enum:
      - allow
      - block
      - mask
      - row-filter
    description: >-
      allow — permitted unchanged; block — rejected; mask — permitted but listed
      result columns are masked; row-filter — permitted but a WHERE predicate is
      injected (and any listed columns are also masked).
  rule:
    type: string
    description: >-
      Machine-readable decision tag. For a block, the blocking rule (e.g.
      read_only, table_denied, table_not_allowed, statement_denied,
      row_filter_unsafe). Otherwise "ok".
    example: ok
  reason:
    type: string
    description: Human-readable explanation of the verdict.
  hint:
    type: string
    description: What the author could do instead (present on block verdicts).
  masked_columns:
    type: array
    description: Result columns that would be masked. Present on mask/row-filter verdicts.
    items:
      $ref: ./DryEvalMaskedColumn.yaml
  row_filter_predicate:
    type: string
    description: The row-filter predicate ANDed into the statement's WHERE clause.
    example: tenant_id = current_setting('pgbeam.tenant')
  rewritten_sql:
    type: string
    description: The statement as it would be sent upstream after row-filter injection.
  notes:
    type: array
    description: >-
      Informational caveats about stateful enforcement a single-statement
      preview cannot model (per-region budgets, approvals, write-mode routing).
    items:
      type: string
