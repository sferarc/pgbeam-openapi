type: object
description: A delivery target for project audit/event notifications.
required:
  - id
  - project_id
  - url
  - format
  - enabled
  - created_at
  - updated_at
properties:
  id:
    type: string
    description: Unique webhook endpoint identifier (prefixed).
    example: whk_01h455vb4pex5vsknk084sn02q
  project_id:
    type: string
    description: Owning project ID.
  url:
    type: string
    description: HTTPS endpoint that receives event deliveries.
    example: https://example.com/hooks/pgbeam
  format:
    type: string
    enum:
      - json
      - splunk_hec
      - datadog
      - elastic
    description: Payload format for delivered events.
  event_types:
    type: array
    description: Event types to deliver. Empty means all events.
    items:
      type: string
      description: An event type (e.g. blocked, anomaly, approval).
  enabled:
    type: boolean
    description: Whether deliveries are active for this endpoint.
  description:
    type: string
    description: Human-readable label for the endpoint.
  created_at:
    type: string
    format: date-time
    description: When the endpoint was created.
  updated_at:
    type: string
    format: date-time
    description: When the endpoint was last updated.
