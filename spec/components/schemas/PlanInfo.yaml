type: object
description: Publicly visible plan metadata and limits.
required:
  - name
  - label
  - monthly_price
  - limits
properties:
  name:
    type: string
    description: Plan tier name (starter, pro, scale).
  label:
    type: string
    description: Display label for the plan.
  monthly_price:
    type: integer
    description: Monthly price in dollars.
  annual_price:
    type: integer
    description: Annual price in dollars (if applicable).
  description:
    type: string
    description: Short description of the plan.
  overage_text:
    type: string
    description: Human-readable overage pricing text.
  trial_days:
    type: integer
    description: Number of trial days for new signups.
  limits:
    $ref: ./PlanLimits.yaml
