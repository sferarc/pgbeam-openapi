type: object
description: Request body for issuing a new agent credential.
required:
  - name
  - policy_profile_id
properties:
  name:
    type: string
    minLength: 1
    maxLength: 128
    description: Human-readable label for the credential.
  policy_profile_id:
    type: string
    description: The policy profile to enforce for this credential.
  principal_type:
    type: string
    enum:
      - agent
      - human
    default: agent
    description: >-
      Whether this credential represents an autonomous agent or a human
      operator.
  expires_at:
    type: string
    format: date-time
    nullable: true
    description: >-
      Optional expiry. When set, the credential becomes unusable at this time
      (must be in the future). Omit or set null for a credential that never
      expires.
