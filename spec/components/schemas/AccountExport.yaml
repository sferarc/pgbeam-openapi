type: object
description: Full account data export for privacy and data-portability requests.
required:
  - user
  - organizations
  - projects
  - databases
  - sessions
  - email_preferences
  - consents
  - audit_logs
  - exported_at
properties:
  user:
    type: object
    description: Core user profile data.
    required:
      - id
      - name
      - email
      - email_verified
      - created_at
      - updated_at
    properties:
      id:
        type: string
        description: User identifier.
      name:
        type: string
        description: Display name for the user.
      email:
        type: string
        format: email
        description: Primary account email address.
      email_verified:
        type: boolean
        description: Whether the email address has been verified.
      image:
        type: string
        description: Avatar image URL, if present.
      created_at:
        type: string
        format: date-time
        description: When the user account was created.
      updated_at:
        type: string
        format: date-time
        description: When the user profile was last updated.
  organizations:
    type: array
    description: Organizations the user belongs to.
    items:
      type: object
      required:
        - id
        - name
        - slug
        - role
        - created_at
      properties:
        id:
          type: string
          description: Organization identifier.
        name:
          type: string
          description: Organization display name.
        slug:
          type: string
          description: Organization slug used in URLs and routing.
        role:
          type: string
          description: User role within the organization.
        created_at:
          type: string
          format: date-time
          description: When the organization membership was created.
  projects:
    type: array
    description: Projects owned through the user's organizations.
    items:
      type: object
      required:
        - id
        - org_id
        - name
        - description
        - status
        - created_at
      properties:
        id:
          type: string
          description: Project identifier.
        org_id:
          type: string
          description: Owning organization identifier.
        name:
          type: string
          description: Project display name.
        description:
          type: string
          description: Project description at export time.
        status:
          type: string
          description: Project lifecycle status.
        created_at:
          type: string
          format: date-time
          description: When the project was created.
  databases:
    type: array
    description: Databases registered under the exported projects.
    items:
      type: object
      required:
        - id
        - project_id
        - host
        - port
        - name
        - ssl_mode
        - role
        - created_at
      properties:
        id:
          type: string
          description: Database identifier.
        project_id:
          type: string
          description: Owning project identifier.
        host:
          type: string
          description: Upstream PostgreSQL host.
        port:
          type: integer
          description: Upstream PostgreSQL port.
        name:
          type: string
          description: Upstream PostgreSQL database name.
        ssl_mode:
          type: string
          description: PostgreSQL SSL mode in use for the database.
        role:
          type: string
          description: Database role within the project.
        created_at:
          type: string
          format: date-time
          description: When the database registration was created.
  sessions:
    type: array
    description: Auth sessions associated with the user.
    items:
      type: object
      required:
        - id
        - expires_at
        - created_at
      properties:
        id:
          type: string
          description: Session identifier.
        expires_at:
          type: string
          format: date-time
          description: When the session expires.
        created_at:
          type: string
          format: date-time
          description: When the session was created.
        ip_address:
          type: string
          description: IP address used to create the session, if known.
        user_agent:
          type: string
          description: User agent captured for the session, if known.
  email_preferences:
    type: object
    description: User communication preferences.
    properties:
      marketing_emails:
        type: boolean
        description: Whether marketing emails are enabled.
      usage_limit_alerts:
        type: boolean
        description: Whether usage alert emails are enabled.
  consents:
    type: array
    description: Recorded legal-document acceptances for the user.
    items:
      type: object
      required:
        - id
        - document_type
        - document_version
        - accepted_at
      properties:
        id:
          type: string
          description: Consent record identifier.
        document_type:
          type: string
          description: Legal document type accepted by the user.
        document_version:
          type: string
          description: Accepted document version.
        accepted_at:
          type: string
          format: date-time
          description: When the document was accepted.
        ip_address:
          type: string
          description: IP address captured when consent was recorded.
  audit_logs:
    type: array
    description: Recent audit log entries associated with the account.
    items:
      type: object
      required:
        - id
        - action
        - created_at
      properties:
        id:
          type: string
          description: Audit log entry identifier.
        action:
          type: string
          description: Action captured by the audit log entry.
        resource_type:
          type: string
          description: Type of resource affected by the action.
        resource_id:
          type: string
          description: Identifier of the affected resource.
        ip_address:
          type: string
          description: IP address associated with the action, if known.
        created_at:
          type: string
          format: date-time
          description: When the audit log entry was recorded.
  exported_at:
    type: string
    format: date-time
    description: When the export was generated.
