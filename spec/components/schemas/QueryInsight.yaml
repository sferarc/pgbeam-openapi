type: object
description: Aggregated analytics for a normalized SQL query shape.
required:
  - query_hash
  - query_pattern
  - total_count
  - total_cache_hits
  - total_cache_misses
  - avg_latency_ms
  - p99_latency_ms
properties:
  query_hash:
    type: string
    description: xxhash64 of the normalized SQL pattern (hex).
  query_pattern:
    type: string
    description: Normalized SQL pattern (truncated to 500 chars).
  total_count:
    type: integer
    format: int64
    description: Total number of executions in the time range.
  total_cache_hits:
    type: integer
    format: int64
    description: Total cache hits attributed to the query shape.
  total_cache_misses:
    type: integer
    format: int64
    description: Total cache misses attributed to the query shape.
  avg_latency_ms:
    type: number
    format: double
    description: Average query latency in milliseconds.
  p99_latency_ms:
    type: number
    format: double
    description: P99 query latency in milliseconds.
