type: object
description: A single issue found while linting a migration.
required:
  - severity
  - rule
  - message
properties:
  severity:
    type: string
    enum:
      - info
      - warning
      - error
    description: How serious the finding is. error indicates an unsafe change.
  rule:
    type: string
    description: >-
      Machine-readable rule identifier (e.g. drop_table,
      add_not_null_no_default).
  message:
    type: string
    description: Human-readable description of the issue.
  statement:
    type: string
    description: The statement that triggered the finding.
  hint:
    type: string
    description: Suggested safer alternative, if any.
