parameters:
  - $ref: ../components/parameters/OrgId.yaml
get:
  operationId: listSupportCases
  summary: List support cases
  description: >-
    Lists support cases for the organization with optional status and search
    filters.
  tags:
    - Support
  parameters:
    - name: status
      in: query
      required: false
      description: Filter by case status.
      schema:
        $ref: ../components/schemas/SupportCaseStatus.yaml
    - name: search
      in: query
      required: false
      description: Search cases by title.
      schema:
        type: string
    - name: page_size
      in: query
      required: false
      description: Number of results per page (1-100, default 20).
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    - name: page
      in: query
      required: false
      description: Page number (1-based, default 1).
      schema:
        type: integer
        minimum: 1
        default: 1
  responses:
    '200':
      description: List of support cases.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ListSupportCasesResponse.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
post:
  operationId: createSupportCase
  summary: Create a support case
  description: Creates a new support case with an initial message.
  tags:
    - Support
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/CreateSupportCaseRequest.yaml
  responses:
    '201':
      description: Support case created.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/SupportCase.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
