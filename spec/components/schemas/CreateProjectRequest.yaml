type: object
description: Request body for creating a project and its primary database.
required:
  - name
  - org_id
  - database
properties:
  name:
    type: string
    description: Human-readable project name.
    minLength: 1
    maxLength: 100
    pattern: ^[^\x00]*$
    example: my-app
  org_id:
    type: string
    minLength: 1
    pattern: ^[^\x00]+$
    description: Better Auth organization ID.
    example: org_abc123
  description:
    type: string
    description: Optional project description.
    maxLength: 500
    example: Production database proxy
  tags:
    type: array
    description: User-defined labels to attach to the project.
    maxItems: 10
    example:
      - production
      - us-east-1
    items:
      type: string
      maxLength: 50
  cloud:
    type: string
    enum:
      - aws
      - azure
      - gcp
    description: Cloud provider for the project.
    default: aws
  database:
    $ref: ./CreateDatabaseRequest.yaml
    description: Primary database. Created atomically with the project.
