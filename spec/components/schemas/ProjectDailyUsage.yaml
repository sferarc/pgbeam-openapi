type: object
description: Daily usage totals for a single project and region.
required:
  - day
  - region
  - queries_total
  - cache_hits
  - cache_misses
  - connection_seconds
  - bytes_transferred
properties:
  day:
    type: string
    format: date
    description: Usage date in UTC.
  region:
    type: string
    description: Region where the traffic was served.
  queries_total:
    type: integer
    format: int64
    description: Total queries served on the day.
  cache_hits:
    type: integer
    format: int64
    description: Total cache hits on the day.
  cache_misses:
    type: integer
    format: int64
    description: Total cache misses on the day.
  connection_seconds:
    type: integer
    format: int64
    description: Total proxy connection time consumed on the day.
  bytes_transferred:
    type: integer
    format: int64
    description: Total bytes transferred to clients.
