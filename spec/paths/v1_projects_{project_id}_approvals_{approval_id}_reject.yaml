parameters:
  - $ref: ../components/parameters/ProjectId.yaml
  - $ref: ../components/parameters/ApprovalId.yaml
post:
  operationId: rejectApprovalRequest
  x-feature-flag: agent-gateway
  summary: Reject a held statement
  description: Rejects a pending approval request, denying the held statement.
  tags:
    - Approvals
  requestBody:
    required: false
    content:
      application/json:
        schema:
          $ref: ../components/schemas/ApprovalDecisionRequest.yaml
  responses:
    '200':
      description: The updated approval request.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ApprovalRequest.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
    '409':
      $ref: ../components/responses/Conflict.yaml
