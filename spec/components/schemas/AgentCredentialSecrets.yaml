type: object
description: >-
  One-time secrets returned only at creation. The connection string and MCP
  token are not retrievable again.
required:
  - credential
  - connection_string
  - mcp_url
  - mcp_token
properties:
  credential:
    $ref: ./AgentCredential.yaml
  connection_string:
    type: string
    description: Guarded Postgres connection string for this agent credential.
    example: postgresql://agent_a1b2c3d4e5f6:secret@abc.proxy.pgbeam.app:5432/mydb
  mcp_url:
    type: string
    description: >-
      Hosted agent-database MCP endpoint for this project, served by the edge
      proxy on the same per-project host the agent connects to over the wire.
      Paste into an MCP client (Claude Code, Cursor, …) with the mcp_token as a
      bearer token.
    example: https://abc.proxy.pgbeam.app/mcp
  mcp_token:
    type: string
    description: Bearer token for the hosted MCP endpoint (shown once).
    example: pba_a1b2c3d4e5f6g7h8
