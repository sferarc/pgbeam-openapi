type: object
description: Result of a PII detection scan over a database's schema.
required:
  - scanned_columns
  - scanned_tables
  - suggestions
properties:
  scanned_tables:
    type: integer
    minimum: 0
    description: Number of tables inspected.
  scanned_columns:
    type: integer
    minimum: 0
    description: Number of columns inspected.
  suggestions:
    type: array
    description: >-
      Ranked masking suggestions, highest confidence first. Empty when no
      likely-PII columns were found.
    items:
      $ref: ./PiiSuggestion.yaml
  truncated:
    type: boolean
    description: >-
      True when the scan stopped early at the column limit and some columns were
      not inspected.
  error:
    type: string
    description: Present when the scan failed to connect or read the schema.
