type: object
description: Request body for issuing a self-host enrollment token.
properties:
  region_label:
    type: string
    description: Operator-supplied label for where the proxy runs.
    maxLength: 100
    pattern: ^[^\x00]*$
    example: customer-vpc-us-east
  description:
    type: string
    description: Optional human-readable note.
    maxLength: 500
    pattern: ^[^\x00]*$
    example: prod cluster
  expires_at:
    type: string
    format: date-time
    nullable: true
    description: >-
      Optional expiry. When set, the enrollment token stops authenticating new
      proxy connections at this time (must be in the future). Omit or set null
      for a token that never expires.
