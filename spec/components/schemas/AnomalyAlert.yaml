type: object
description: A surfaced anomalous-behavior alert for review.
required:
  - id
  - project_id
  - kind
  - severity
  - title
  - status
  - created_at
properties:
  id:
    type: string
    description: Unique anomaly alert identifier (prefixed).
    example: ano_01h455vb4pex5vsknk084sn02q
  project_id:
    type: string
    description: Owning project ID.
  credential_id:
    type: string
    nullable: true
    description: Agent credential implicated, if any.
  kind:
    type: string
    description: Machine-readable anomaly kind (e.g. egress_spike, novel_query_shape).
  severity:
    type: string
    enum:
      - info
      - warning
      - critical
    description: Alert severity.
  title:
    type: string
    description: Human-readable summary.
  details:
    type: object
    additionalProperties: true
    description: Structured details about the anomaly.
  status:
    type: string
    enum:
      - open
      - acknowledged
      - resolved
    description: Triage state of the alert.
  window_start:
    type: string
    format: date-time
    nullable: true
    description: Start of the observation window, if applicable.
  window_end:
    type: string
    format: date-time
    nullable: true
    description: End of the observation window, if applicable.
  created_at:
    type: string
    format: date-time
    description: When the alert was raised.
  acknowledged_at:
    type: string
    format: date-time
    nullable: true
    description: When the alert was acknowledged, if any.
  acknowledged_by:
    type: string
    nullable: true
    description: User who acknowledged the alert, if any.
