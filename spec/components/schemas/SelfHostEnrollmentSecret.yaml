type: object
description: >
  Response returned once when an enrollment is created. The token is shown a
  single time and cannot be retrieved again; set it as GRPC_AUTH_TOKEN on the
  self-hosted proxy.
required:
  - enrollment
  - token
properties:
  enrollment:
    $ref: ./SelfHostEnrollment.yaml
  token:
    type: string
    description: The plaintext enrollment token (pbh_...). Shown once.
    example: pbh_01h455vb4pex5vsknk084sn02q9zk3m7
