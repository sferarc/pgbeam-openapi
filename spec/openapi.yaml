openapi: 3.0.0
info:
  title: PgBeam Control Plane API
  description: >
    REST API for the PgBeam multi-tenant PostgreSQL proxy platform.

    Manages projects, database connections, cache/pool configuration, and
    regions.
  version: 1.0.0
  license:
    name: Proprietary
    url: https://pgbeam.com/terms
  contact:
    name: PgBeam
    url: https://pgbeam.com
servers:
  - url: https://api.pgbeam.com
    description: Production
security:
  - BearerAuth: []
  - ApiKeyAuth: []
tags:
  - name: Projects
    description: Project lifecycle, custom domains, read replicas, and cache rules
    x-icon: FolderKanban
  - name: Databases
    description: Database connection management per project
    x-icon: Database
  - name: Policies
    description: Policy profiles enforced on agent credentials
    x-icon: ShieldCheck
  - name: Agents
    description: Scoped agent credentials for AI agent database access
    x-icon: Bot
  - name: Approvals
    description: Human approval workflow for held agent statements
    x-icon: CircleCheck
  - name: Webhooks
    description: Event delivery endpoints for project audit and anomaly events
    x-icon: Webhook
  - name: Anomalies
    description: Anomalous-behavior alerts surfaced by the gateway
    x-icon: TriangleAlert
  - name: Branches
    description: Ephemeral sandbox branches for write isolation
    x-icon: GitBranch
  - name: Migrations
    description: Migration safety linting for schema changes
    x-icon: FileCog
  - name: Analytics
    description: Usage metrics, billing data, and query insights
    x-icon: ChartLine
  - name: Platform
    description: Regions and health checks
    x-icon: Globe
  - name: Account
    description: Account data, privacy controls, and onboarding
    x-icon: CircleUser
  - name: Support
    description: Support case management
    x-icon: LifeBuoy
  - name: Internal
    description: Internal service-to-service endpoints
  - name: MCP
    description: Model Context Protocol (MCP) remote server endpoint
    x-sdk-exclude:
      - go
      - ts
