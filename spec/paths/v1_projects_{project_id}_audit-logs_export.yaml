parameters:
  - $ref: ../components/parameters/ProjectId.yaml
get:
  operationId: exportAuditLogs
  x-feature-flag: agent-gateway
  summary: Export agent audit logs as CSV
  description: >-
    Streams the project's agent audit entries as a CSV file, newest first,
    honoring the same credential, event, decision, source and date-range filters
    as the list endpoint. The full filtered set is streamed (no pagination); the
    result is suitable for spreadsheets, SIEM ingestion, and compliance
    archives.
  tags:
    - Agents
  parameters:
    - $ref: ../components/parameters/AuditCredentialId.yaml
    - $ref: ../components/parameters/AuditEvent.yaml
    - $ref: ../components/parameters/AuditDecision.yaml
    - $ref: ../components/parameters/AuditSource.yaml
    - $ref: ../components/parameters/AuditStart.yaml
    - $ref: ../components/parameters/AuditEnd.yaml
  responses:
    '200':
      description: CSV stream of filtered audit entries.
      content:
        text/csv:
          schema:
            type: string
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
    '429':
      $ref: ../components/responses/TooManyRequests.yaml
