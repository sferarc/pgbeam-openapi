components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT issued by Better Auth. Verified via JWKS.
    ApiKeyAuth:
      type: http
      scheme: bearer
      bearerFormat: APIKey
      description: >-
        API key issued via the dashboard. Pass it as `Authorization: Bearer
        <api-key>`.
    InternalSecret:
      type: apiKey
      in: header
      name: X-Internal-Secret
      description: Shared secret for dashboard-to-API service calls.
x-iac-resources:
  Project:
    description: Manages a PgBeam project with a primary database.
    operations:
      create: createProject
      read: getProject
      update: updateProject
      delete: deleteProject
      list: listProjects
    connection-details:
      - proxy_host
    extra-outputs:
      primary_database_id:
        path: database.id
        description: ID of the primary database created with this project.
    adoption:
      match-fields:
        - name
      list-query-params:
        org_id: org_id
        page_size: 100
  Database:
    description: Manages an upstream database connection within a PgBeam project.
    operations:
      create: createDatabase
      read: getDatabase
      update: updateDatabase
      delete: deleteDatabase
      list: listDatabases
    connection-details:
      - connection_string
  Replica:
    description: Manages a read replica for a PgBeam database.
    operations:
      create: createReplica
      delete: deleteReplica
      list: listReplicas
  CustomDomain:
    description: Manages a custom domain for a PgBeam project.
    operations:
      create: createCustomDomain
      delete: deleteCustomDomain
      list: listCustomDomains
      verify: verifyCustomDomain
    connection-details:
      - dns_verification_token
  CacheRule:
    description: Manages a per-query cache rule. Deletion disables caching (soft-delete).
    id-field: query_hash
    operations:
      upsert: updateCacheRule
      list: listCacheRules
    soft-delete:
      cache_enabled: false
  SpendLimit:
    description: Manages the monthly spend limit for an organization.
    id-field: org_id
    operations:
      upsert: updateSpendLimit
      read: getOrganizationPlan
    soft-delete:
      spend_limit: null
  AgentCredential:
    description: >-
      Manages a scoped agent credential (a PgBeam-issued Postgres login plus a
      hosted MCP token) for an AI agent. The connection string and MCP token are
      one-time secrets returned only at creation and exposed as sensitive
      computed outputs; they cannot be retrieved again. To rotate the secrets,
      taint/replace the resource (or use the rotate endpoint out of band).
    operations:
      create: createAgentCredential
      read: getAgentCredential
      update: updateAgentCredentialStatus
      delete: revokeAgentCredential
      list: listAgentCredentials
    extra-outputs:
      connection_string:
        path: connection_string
        description: >-
          One-time guarded Postgres connection string for this agent credential
          (shown once).
        sensitive: true
      mcp_url:
        path: mcp_url
        description: >-
          Hosted agent-database MCP endpoint for this project. Use with the
          mcp_token as a bearer token.
      mcp_token:
        path: mcp_token
        description: One-time bearer token for the hosted MCP endpoint (shown once).
        sensitive: true
    adoption:
      match-fields:
        - name
      list-query-params:
        page_size: 100
  PolicyProfile:
    description: >-
      Manages a policy profile: a named bundle of agent-gateway enforcement
      rules (access mode, table allow/deny lists, statement-kind rules, PII
      masking rules, per-relation row filters, query/egress budgets, write mode,
      approvals, and migration safety) attached to agent credentials and
      enforced in the PG wire protocol. Nested-list fields (masking_rules,
      row_filters) and the nested statement_rules object are expressed as
      structured config.
    operations:
      create: createPolicyProfile
      read: getPolicyProfile
      update: updatePolicyProfile
      delete: deletePolicyProfile
      list: listPolicyProfiles
    adoption:
      match-fields:
        - name
      list-query-params:
        page_size: 100
  WebhookEndpoint:
    description: >-
      Manages a webhook endpoint that receives project audit and anomaly event
      deliveries. The signing secret is write-only and never returned by the
      API.
    operations:
      create: createWebhookEndpoint
      read: getWebhookEndpoint
      update: updateWebhookEndpoint
      delete: deleteWebhookEndpoint
      list: listWebhookEndpoints
    adoption:
      match-fields:
        - url
      list-query-params:
        page_size: 100
  SelfHostEnrollment:
    description: >-
      Manages a self-host (BYOC) enrollment: a token a self-hosted proxy uses to
      authenticate to the control plane's config/audit stream. The token is a
      one-time secret returned only at creation and exposed as a sensitive
      computed output; it cannot be retrieved again. To rotate the token,
      replace the resource. Deletion revokes the enrollment.
    operations:
      create: createSelfHostEnrollment
      delete: revokeSelfHostEnrollment
      list: listSelfHostEnrollments
    extra-outputs:
      token:
        path: token
        description: >-
          One-time enrollment token (pbh_...) for the self-hosted proxy's
          GRPC_AUTH_TOKEN (shown once).
        sensitive: true
