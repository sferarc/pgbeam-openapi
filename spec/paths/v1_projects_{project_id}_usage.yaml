get:
  operationId: getProjectUsage
  summary: Get project usage
  description: Returns daily usage data for a specific project, broken down by region.
  tags:
    - Analytics
  security:
    - BearerAuth: []
    - ApiKeyAuth: []
  parameters:
    - $ref: ../components/parameters/ProjectId.yaml
    - name: start_date
      in: query
      required: true
      schema:
        type: string
        format: date
        example: '2024-01-01'
      description: Start date (inclusive, YYYY-MM-DD).
    - name: end_date
      in: query
      required: true
      schema:
        type: string
        format: date
        example: '2024-01-31'
      description: End date (inclusive, YYYY-MM-DD).
  responses:
    '200':
      description: Daily usage data by region.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ProjectUsageResponse.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
    '429':
      $ref: ../components/responses/TooManyRequests.yaml
