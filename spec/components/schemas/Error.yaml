type: object
description: Standard error response envelope for PgBeam API requests.
required:
  - error
properties:
  error:
    type: object
    description: Error metadata for the failed request.
    required:
      - code
      - message
    properties:
      code:
        type: string
        description: Machine-readable error code.
      message:
        type: string
        description: Human-readable error message.
