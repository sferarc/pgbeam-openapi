type: object
description: A PgBeam-issued, scoped Postgres login plus hosted MCP token for an AI agent.
required:
  - id
  - project_id
  - policy_profile_id
  - name
  - pg_username
  - status
  - created_at
  - updated_at
properties:
  id:
    type: string
    description: Unique agent credential identifier (prefixed).
    example: agt_01h455vb4pex5vsknk084sn02q
  project_id:
    type: string
    description: Owning project ID.
    example: prj_01h455vb4pex5vsknk084sn02q
  policy_profile_id:
    type: string
    description: Policy profile enforced for this credential.
    example: pol_01h455vb4pex5vsknk084sn02q
  name:
    type: string
    description: Human-readable label for the credential.
    example: Claude Code (analytics)
  pg_username:
    type: string
    description: The Postgres username this credential presents to the proxy.
    example: agent_a1b2c3d4e5f6
  status:
    type: string
    description: Lifecycle status of the credential.
    enum:
      - active
      - disabled
      - revoked
  principal_type:
    type: string
    enum:
      - agent
      - human
    default: agent
    description: >-
      Whether this credential represents an autonomous agent or a human
      operator.
  auth_method:
    type: string
    enum:
      - cleartext
      - scram-sha-256
    default: scram-sha-256
    readOnly: true
    description: Postgres auth method the proxy presents for this credential.
  last_used_at:
    type: string
    format: date-time
    nullable: true
    description: When the credential was last used to connect, if ever.
  expires_at:
    type: string
    format: date-time
    nullable: true
    description: >-
      When the credential expires and becomes unusable. Null means it never
      expires. Enforcement is fail-closed in the proxy the instant this time
      passes, before any cleanup sweep runs.
  created_at:
    type: string
    format: date-time
    description: When the credential was created.
  updated_at:
    type: string
    format: date-time
    description: When the credential was last updated.
