type: object
description: Connection pool configuration.
required:
  - pool_size
  - min_pool_size
  - pool_mode
properties:
  pool_size:
    type: integer
    minimum: 1
    maximum: 10000
    default: 10
    description: Maximum connections in the pool.
    example: 20
  min_pool_size:
    type: integer
    minimum: 1
    maximum: 10000
    default: 1
    description: Minimum idle connections maintained.
    example: 5
  pool_mode:
    $ref: ./PoolMode.yaml
  max_active:
    type: integer
    minimum: 1
    maximum: 10000
    default: 200
    description: Maximum concurrent upstream connections per pool.
