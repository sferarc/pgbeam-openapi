type: object
description: One column of a relation in the schema catalog.
required:
  - name
  - data_type
  - is_binary
properties:
  name:
    type: string
    description: Column name.
    example: email
  data_type:
    type: string
    description: PostgreSQL data type (information_schema.data_type).
    example: text
  is_binary:
    type: boolean
    description: >-
      True for binary-typed columns (e.g. bytea). Masking a binary column always
      returns NULL — a redact/hash token would corrupt the wire type — so the
      editor warns when a masking rule targets one.
