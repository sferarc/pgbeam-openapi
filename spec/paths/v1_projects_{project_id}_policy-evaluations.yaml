parameters:
  - $ref: ../components/parameters/ProjectId.yaml
post:
  operationId: dryEvalPolicy
  x-feature-flag: agent-gateway
  summary: Dry-eval a policy against a SQL statement
  description: >-
    Evaluates a single SQL statement against a policy (either a draft policy
    supplied inline or an existing policy referenced by id) and returns the
    decision the proxy would make: allow, block, mask, or row-filter. The
    evaluation reuses the data plane's own policy engine (the same parser,
    allow/block rules, row-filter rewriter, and masking analysis enforced on
    live agent sessions), so a what-if verdict matches real enforcement.
    Stateful checks a single-statement preview cannot model (per-region query
    and egress budgets, human approvals, and rollback/sandbox write routing) are
    reported as informational notes, not verdicts. This is a pure compute
    endpoint; it does not connect to the upstream database and persists nothing.
  tags:
    - Policies
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/DryEvalInput.yaml
  responses:
    '200':
      description: The dry-eval decision.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/DryEvalResult.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
    '429':
      $ref: ../components/responses/TooManyRequests.yaml
