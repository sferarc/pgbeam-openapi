type: object
description: Aggregate latency metrics for the selected time range.
required:
  - avg_ms
  - p99_ms
properties:
  avg_ms:
    type: number
    format: double
    description: Average latency in milliseconds across all queries.
  p99_ms:
    type: number
    format: double
    description: P99 latency in milliseconds across all queries.
