type: object
description: Query cache configuration.
required:
  - enabled
  - ttl_seconds
  - max_entries
  - swr_seconds
properties:
  enabled:
    type: boolean
    default: true
    description: >-
      Whether query caching is enabled. When false, all queries bypass the
      cache.
  ttl_seconds:
    type: integer
    minimum: 0
    maximum: 86400
    default: 60
    description: Cache TTL in seconds for query results.
  max_entries:
    type: integer
    minimum: 0
    maximum: 1000000
    default: 10000
    description: Maximum number of cached query results.
  swr_seconds:
    type: integer
    minimum: 0
    maximum: 86400
    default: 30
    description: Stale-while-revalidate window in seconds.
