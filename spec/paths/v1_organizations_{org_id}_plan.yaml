get:
  operationId: getOrganizationPlan
  summary: Get organization plan
  description: Returns the current plan and limits for the organization.
  tags:
    - Analytics
  security:
    - BearerAuth: []
    - ApiKeyAuth: []
  parameters:
    - $ref: ../components/parameters/OrgId.yaml
  responses:
    '200':
      description: Organization plan details.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/OrganizationPlan.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '429':
      $ref: ../components/responses/TooManyRequests.yaml
