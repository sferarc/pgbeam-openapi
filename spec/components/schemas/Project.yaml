type: object
description: Project configuration and current control-plane state.
required:
  - id
  - org_id
  - name
  - status
  - created_at
  - updated_at
properties:
  id:
    type: string
    description: Unique project identifier (prefixed).
    example: prj_01h455vb4pex5vsknk084sn02q
  org_id:
    type: string
    description: Better Auth organization ID that owns this project.
    example: org_abc123
  name:
    type: string
    description: Human-readable project name.
    minLength: 1
    maxLength: 100
    example: my-app
  description:
    type: string
    description: Optional project description.
    maxLength: 500
    example: Production database proxy
  tags:
    type: array
    description: User-defined labels applied to the project.
    maxItems: 10
    example:
      - production
      - us-east-1
    items:
      type: string
      maxLength: 50
  cloud:
    type: string
    enum:
      - aws
      - azure
      - gcp
    description: Cloud provider where the project runs.
    readOnly: true
  self_hosted:
    type: boolean
    description: >
      When true, this project's data plane runs in the customer's own
      VPC/cluster (BYOC): the control plane does not provision hosted infra, and
      a self-hosted proxy dials home over the config/audit gRPC stream. Requires
      the Scale or enterprise plan.
    readOnly: true
    example: false
  proxy_host:
    type: string
    description: >-
      Proxy hostname for connecting through PgBeam (e.g.,
      myproject.proxy.pgbeam.app).
    readOnly: true
  queries_per_second:
    type: integer
    format: int32
    minimum: 0
    maximum: 2147483647
    description: Maximum queries per second for this project. 0 means unlimited.
    readOnly: true
    example: 1000
  burst_size:
    type: integer
    format: int32
    minimum: 0
    maximum: 2147483647
    description: >-
      Burst allowance above the steady-state rate. 0 uses queries_per_second as
      burst.
    readOnly: true
    example: 200
  max_connections:
    type: integer
    format: int32
    minimum: 0
    maximum: 2147483647
    description: Maximum concurrent proxy connections. 0 means unlimited.
    readOnly: true
    example: 500
  allowed_cidrs:
    type: array
    description: >
      IP filtering rules as CIDR ranges with optional labels. When non-empty,
      only connections from matching IPs are accepted. Empty array means all IPs
      are allowed (default). Both IPv4 (e.g. 10.0.0.0/8) and IPv6 (e.g.
      2001:db8::/32) are supported.
    example:
      - cidr: 10.0.0.0/8
        label: VPC
      - cidr: 2001:db8::/32
        label: IPv6 range
    items:
      $ref: ./CidrEntry.yaml
    maxItems: 50
  default_policy_profile_id:
    type: string
    nullable: true
    description: >-
      When set, passthrough/human connections are enforced against this policy
      profile.
    example: pol_01h455vb4pex5vsknk084sn02q
  residency:
    $ref: ./DataResidency.yaml
  agents_disabled:
    type: boolean
    description: >
      Project-level kill-switch. When true, ALL agent-credential connections to
      this project are blocked at the proxy and live agent sessions are dropped
      within seconds. Passthrough/human connections are unaffected.
    example: false
  database_count:
    type: integer
    description: Number of databases attached to this project.
    readOnly: true
  active_connections:
    type: integer
    description: >-
      Current active connections (latest metrics snapshot). 0 when no metrics
      data.
    readOnly: true
  status:
    $ref: ./ProjectStatus.yaml
  created_at:
    type: string
    format: date-time
    description: When the project was created.
  updated_at:
    type: string
    format: date-time
    description: When the project was last updated.
