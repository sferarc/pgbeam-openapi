type: object
description: Request body for creating a support case.
required:
  - org_id
  - title
  - body
properties:
  org_id:
    type: string
    description: Organization ID.
  title:
    type: string
    description: Brief summary of the issue.
    minLength: 1
    maxLength: 500
  severity:
    type: integer
    minimum: 1
    maximum: 4
    default: 4
    description: 'Severity level: 1=Critical, 2=High, 3=Normal, 4=Low.'
  body:
    type: string
    description: Initial message body.
    minLength: 1
    maxLength: 50000
